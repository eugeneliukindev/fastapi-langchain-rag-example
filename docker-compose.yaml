services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${MY_APP__DB__USER}
      POSTGRES_PASSWORD: ${MY_APP__DB__PASSWORD}
      POSTGRES_DB: ${MY_APP__DB__NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/

volumes:
  postgres_data:
