services:
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: ${MY_APP__DB__USER}
      POSTGRES_PASSWORD: ${MY_APP__DB__PASSWORD}
      POSTGRES_DB: ${MY_APP__DB__NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MY_APP__DB__USER} -d ${MY_APP__DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrate
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: no

  app:
    build:
      context: .
      target: app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: rebuild
          path: uv.lock

volumes:
  postgres_data:
